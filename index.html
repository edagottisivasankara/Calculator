<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-wrapper">
        <div class="calculator" id="calculator">
            <div class="header">
                <button id="mode-toggle" class="mode-btn">Scientific</button>
            </div>
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            
            <div class="keypad-container">
                <div class="keypad" id="keypad">
                    <!-- Standard Pad -->
                    <button class="btn btn-action" data-action="clear">AC</button>
                    <button class="btn btn-action" data-action="delete">DEL</button>
                    <button class="btn btn-operator" data-action="operator" data-value="%">%</button>
                    <button class="btn btn-operator" data-action="operator" data-value="÷">÷</button>

                    <button class="btn btn-number" data-value="7">7</button>
                    <button class="btn btn-number" data-value="8">8</button>
                    <button class="btn btn-number" data-value="9">9</button>
                    <button class="btn btn-operator" data-action="operator" data-value="×">×</button>

                    <button class="btn btn-number" data-value="4">4</button>
                    <button class="btn btn-number" data-value="5">5</button>
                    <button class="btn btn-number" data-value="6">6</button>
                    <button class="btn btn-operator" data-action="operator" data-value="-">-</button>

                    <button class="btn btn-number" data-value="1">1</button>
                    <button class="btn btn-number" data-value="2">2</button>
                    <button class="btn btn-number" data-value="3">3</button>
                    <button class="btn btn-operator" data-action="operator" data-value="+">+</button>

                    <button class="btn btn-number zero-btn" data-value="0">0</button>
                    <button class="btn btn-number" data-value=".">.</button>
                    <button class="btn btn-equals" data-action="calculate">=</button>
                </div>

                <div class="scientific-pad hidden" id="scientific-pad">
                    <button class="btn btn-sci" data-action="sci" data-value="sin">sin</button>
                    <button class="btn btn-sci" data-action="sci" data-value="cos">cos</button>
                    <button class="btn btn-sci" data-action="sci" data-value="tan">tan</button>
                    
                    <button class="btn btn-sci" data-action="sci" data-value="ln">ln</button>
                    <button class="btn btn-sci" data-action="sci" data-value="log">log</button>
                    <button class="btn btn-sci" data-action="sci" data-value="√">√</button>

                    <button class="btn btn-sci" data-action="sci" data-value="pi">π</button>
                    <button class="btn btn-sci" data-action="sci" data-value="e">e</button>
                    <button class="btn btn-sci" data-action="sci" data-value="^">x^y</button>
                    
                    <button class="btn btn-sci" data-action="sci" data-value="x2">x²</button>
                    <button class="btn btn-sci" data-action="sci" data-value="1/x">1/x</button>
                    <button class="btn btn-sci" data-action="sci" data-value="!">x!</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
